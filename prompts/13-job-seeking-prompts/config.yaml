essay_templates:
  ai_experience: |
    I have over 17 years of experience in software engineering, with the last 4 years focused on prompt engineering, generative AI, and agentic workflows. As AI Development Lead at TopNetworks, I designed and built four internal SaaS tools (EmailGenius, TrafficGenius, RouteGenius, and Social Media Genius). I designed and deployed production-grade multi-agent orchestrations using LangGraph and CrewAI, establishing strict LLM guardrails and evaluation frameworks.

  previous_role: |
    As AI Development Lead at TopNetworks, I designed, built, and shipped several internal SaaS tools (EmailGenius, TrafficGenius, RouteGenius) that replaced expensive third-party subscriptions. I utilized Next.js 15, TypeScript, Python, and Vertex AI. I led rapid prototyping using AI-assisted environments (Cursor, Copilot), which significantly reduced engineering time and software licensing costs.

  ai_leadership: |
    I combine AI expertise with full-stack engineering and product thinking. Over the past 4 years, I've specialized in Generative AI, prompt engineering, LLM fine-tuning (PEFT, RLHF), and agentic system orchestration. At TopNetworks, I led the design and delivery of an AI-native SaaS ecosystem serving performance publishing operations across the US, UK, Mexico, and Latin America. I excel at translating advanced AI capabilities into practical systems that drive measurable business outcomes.

  career_transition: |
    I am an AI Development Lead and full-stack architect transitioning into my next senior role. My background spans 17 years of technology leadership and 4 years of deep specialization in enterprise Generative AI. I'm passionate about building practical, production-ready AI systems that solve real business problems. I'm seeking a role where I can combine strategic AI leadership with hands-on technical ownership.

